<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Espaço do Empreendedor · Reformulação do frontend</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #F3ECE0; font-family: 'Manrope', sans-serif; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-tokens.jsx"></script>
<script type="text/babel" src="common.jsx"></script>
<script type="text/babel" src="screens/system.jsx"></script>
<script type="text/babel" src="screens/landing.jsx"></script>
<script type="text/babel" src="screens/login.jsx"></script>
<script type="text/babel" src="screens/dashboard-chrome.jsx"></script>
<script type="text/babel" src="screens/student.jsx"></script>
<script type="text/babel" src="screens/case-detail.jsx"></script>
<script type="text/babel" src="screens/professor.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel" data-presets="react">
const DCanvas = window.DesignCanvas;
const DCSec = window.DCSection;
const DCArt = window.DCArtboard;

function App() {
  return (
    <DCanvas>
      <DCSec id="system" title="Direção & design system">
        <DCArt id="overview" label="Diagnóstico + direção + tokens" width={1400} height={1700}>
          <SystemOverviewScreen/>
        </DCArt>
      </DCSec>

      <DCSec id="public" title="Área pública">
        <DCArt id="landing" label="Landing page" width={1440} height={2100}>
          <LandingScreen/>
        </DCArt>
        <DCArt id="login" label="Login / Primeiro acesso" width={1440} height={900}>
          <LoginScreen/>
        </DCArt>
      </DCSec>

      <DCSec id="aluno" title="Área do aluno extensionista">
        <DCArt id="queue" label="Fila de atendimento" width={1440} height={900}>
          <StudentQueueScreen/>
        </DCArt>
        <DCArt id="mine" label="Meus casos" width={1440} height={900}>
          <StudentMyCasesScreen/>
        </DCArt>
        <DCArt id="case" label="Caso · registro de atendimento" width={1440} height={1100}>
          <CaseDetailScreen/>
        </DCArt>
        <DCArt id="hours" label="Horas extensionistas" width={1440} height={900}>
          <StudentHoursScreen/>
        </DCArt>
      </DCSec>

      <DCSec id="professor" title="Área do professor orientador">
        <DCArt id="dash" label="Dashboard" width={1440} height={1000}>
          <ProfDashboardScreen/>
        </DCArt>
        <DCArt id="validations" label="Validações de horas" width={1440} height={1000}>
          <ProfValidationsScreen/>
        </DCArt>
      </DCSec>
    </DCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
